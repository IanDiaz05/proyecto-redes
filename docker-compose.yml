services:
  api-service:
    build: ./backend
    # es necesario exponer los puertos ya que el objetivo de la actividad es monitorear el trafico de red TCP y UDP crudos.
    ports:
      - "12000:12000/tcp" 
      - "12001:12001/udp"
    networks:
      - dokploy-network
    environment:
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - SECRET_AUTH_TOKEN=${SECRET_AUTH_TOKEN}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
    restart: always

  dashboard:
    build:
      context: ./frontend
      args:
        - VITE_API_BASE_URL=${VITE_API_BASE_URL}
        - VITE_API_KEY=${SECRET_AUTH_TOKEN}
    networks:
      - dokploy-network
    restart: always

networks:
  dokploy-network:
    external: true